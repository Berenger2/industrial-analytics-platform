name: industrial-analytics-platform

services:
  postgres:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-industrial_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-industrial}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-industrial} -d ${POSTGRES_DB:-industrial_analytics}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - platform

  cube:
    build:
      context: ./cube
    environment:
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: postgres
      CUBEJS_DB_PORT: 5432
      CUBEJS_DB_NAME: ${POSTGRES_DB:-industrial_analytics}
      CUBEJS_DB_USER: ${POSTGRES_USER:-industrial}
      CUBEJS_DB_PASS: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:?CUBEJS_API_SECRET must be set in .env}
      CUBEJS_DEV_MODE: ${CUBEJS_DEV_MODE:-true}
    ports:
      - "127.0.0.1:${CUBE_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - platform

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_CUBE_API_URL: ${VITE_CUBE_API_URL:-http://localhost:4000/cubejs-api/v1}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - cube
    restart: unless-stopped
    networks:
      - platform

  importer:
    build:
      context: ./importer
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-industrial}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-industrial_analytics}
      IMPORT_INPUT_DIR: /data/samples
      IMPORT_SOURCE_SYSTEM: ${IMPORT_SOURCE_SYSTEM:-sample-files}
      IMPORT_SITES_FILE: ${IMPORT_SITES_FILE:-sites.csv}
      IMPORT_PRODUCTS_FILE: ${IMPORT_PRODUCTS_FILE:-products.csv}
      IMPORT_PRODUCTION_ORDERS_FILE: ${IMPORT_PRODUCTION_ORDERS_FILE:-production_orders.csv}
      IMPORT_QUALITY_CONTROLS_FILE: ${IMPORT_QUALITY_CONTROLS_FILE:-quality_controls.xml}
      IMPORT_QUALITY_CONTROL_RECORD_TAG: ${IMPORT_QUALITY_CONTROL_RECORD_TAG:-quality_control}
      IMPORT_CSV_DELIMITER: ${IMPORT_CSV_DELIMITER:-,}
      IMPORT_BATCH_SIZE: ${IMPORT_BATCH_SIZE:-500}
      IMPORT_MAX_ERROR_DETAILS: ${IMPORT_MAX_ERROR_DETAILS:-20}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-10}
      DATABASE_APPLICATION_NAME: ${DATABASE_APPLICATION_NAME:-industrial-analytics-importer}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data/samples:/data/samples:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - platform

volumes:
  postgres_data:

networks:
  platform:
    driver: bridge
