name: Publish container images

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.service }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: frontend
            target: production
          - service: importer
            context: importer
            target: ""
          - service: cube
            context: cube
            target: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image namespace
        id: namespace
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: echo "value=${REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@v5
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        with:
          images: ghcr.io/${{ steps.namespace.outputs.value }}/industrial-analytics-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ env.SOURCE_SHA }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
